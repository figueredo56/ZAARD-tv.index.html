<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD | Ecosistema</title>
    <style>
        body { margin: 0; padding: 10px; font-family: sans-serif; text-align: center; color: white; background: url('https://ipfs.io/ipfs/bafybeic3rhz5qpxq3slf4n77h6jwhtspd3jifjm2z7777cm4whniozi32u') no-repeat center center fixed; background-size: cover; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Pantalla de bienvenida */
        #welcome-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .blink { animation: blink-text 1.5s infinite; color: #00ff00; font-weight: bold; }
        @keyframes blink-text { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Contenedores reducidos un 25% para mejor armonía */
        .video-container { width: 75%; max-width: 280px; height: 160px; border: 2px solid #00ffcc; border-radius: 10px; overflow: hidden; margin-bottom: 15px; background: rgba(0,0,0,0.5); }
        
        /* Efecto de pulso para botones */
        .pulse-border { border: 2px solid #800080; animation: pulse-purple 2s infinite; }
        @keyframes pulse-purple { 0% { box-shadow: 0 0 0 0 rgba(128, 0, 128, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(128, 0, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(128, 0, 128, 0); } }

        .btn-token { width: 60px; height: 60px; border-radius: 50%; background: url('https://ipfs.io/ipfs/bafybeiggz26x26hncisti5s5y74ciuk4yuymtczhsbwdufoql2gidl57mu') center/cover; display: block; margin: 0 auto; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 85%; max-width: 320px; margin-top: 10px; }
        .btn { background: rgba(0,0,0,0.6); border: 1px solid #800080; padding: 8px 2px; text-decoration: none; border-radius: 6px; font-size: 0.6em; color: #00ff00; animation: blink-green 1.5s infinite; }
        @keyframes blink-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 class="blink">Bienvenidos al canal oficial ZAARD</h1>
        <p style="padding: 10px; font-size: 0.9em;">ZAARD es un ecosistema que engloba todo lo referente a la IA con token, juegos, NFT y alta calidad.</p>
        <button onclick="document.getElementById('welcome-screen').style.display='none'" class="btn blink" style="padding: 15px 30px; font-size: 1em; border-color: #00ff00;">GO ecosystem ZAARD</button>
    </div>

    <div class="video-container"><iframe src="https://www.youtube.com/embed/3ZLhfmZWLXk" style="width:100%; height:100%; border:none;"></iframe></div>

    <div style="margin-bottom: 15px;">
        <a href="https://app.binance.com/uni-qr/web3-token-details?tokenCA=0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65&binanceChainId=56" class="btn-token pulse-border"></a>
        <span style="font-size: 0.7em; display: block; margin-top: 4px;">GO TOKEN</span>
    </div>

    <a href="https://pancakeswap.finance/swap?outputCurrency=0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65" class="pulse-border" style="display:block; width: 160px; padding: 8px; text-decoration:none; color:#00ff00; font-size: 0.7em; border-radius: 8px; margin-bottom: 20px;">PANKACKE SWAP</a>

    <div class="grid">
        <a href="#" class="btn">MÚSICA</a>
        <a href="#" class="btn">DEPORTES</a>
        <a href="#" class="btn">NOTICIAS</a>
        <a href="#" class="btn">CIENCIAS</a>
        <a href="#" class="btn">CINE</a>
        <a href="#" class="btn">GAMING</a>
        <a href="#" class="btn" style="border-color: #fff;">NFTs</a>
    </div>

    <div class="grid" style="grid-template-columns: 1fr 1fr; margin-top: 15px;">
        <a href="https://figueredo56.github.io/ZAARD-Arcade/index-menu.html" class="btn pulse-border" style="border-color: #00ffcc;">ZAARD ARCADE</a>
        <a href="https://figueredo56.github.io/zaard-official/" class="btn pulse-border" style="border-color: #00ffcc;">ZAARD WEB</a>
    </div>

</body>
</html>
