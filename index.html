<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAARD | Menú Principal</title>
    <style>
        body { 
            margin: 0; padding: 10px; font-family: sans-serif; text-align: center; color: white; 
            background: #000; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; box-sizing: border-box;
        }
        
        /* Ajustes de tamaño y orden */
        .btn-go-pancake-wrapper { 
            display: block; width: 100%; max-width: 300px; height: 60px; 
            background: url('https://ipfs.io/ipfs/bafybeialafpyzu6sfct2xchwiza4xh2jcrfyrbonv2dkctnxocpaclcyci') no-repeat center center; 
            background-size: cover; border-radius: 8px; border: 1px solid #800080; 
            text-decoration: none; display: flex; align-items: center; justify-content: center; 
            margin-bottom: 15px;
        }
        .go-label { font-size: 0.8em; color: #00ff00; font-weight: bold; text-shadow: 1px 1px 1px #000; }

        .video-container { 
            width: 100%; max-width: 320px; height: 200px; /* Video más grande */
            border: 2px solid #00ffcc; border-radius: 10px; overflow: hidden; margin-bottom: 15px; 
        }
        .video-container iframe { width: 100%; height: 100%; }
        
        .btn-token { 
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; 
            background: url('https://ipfs.io/ipfs/bafybeiggz26x26hncisti5s5y74ciuk4yuymtczhsbwdufoql2gidl57mu') no-repeat center center; 
            background-size: cover; margin-bottom: 15px; display: block;
        }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 400px; margin-top: 5px; }
        .btn { 
            background: rgba(0,0,0,0.7); border: 1px solid #800080; padding: 12px 2px; 
            text-decoration: none; border-radius: 8px; font-size: 0.8em; color: #00ff00; 
            animation: blink-green 1.5s infinite; 
        }

        @keyframes blink-green { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <a href="https://pancakeswap.finance/swap?outputCurrency=0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65" class="btn-go-pancake-wrapper">
        <span class="go-label">PANKACKE</span>
    </a>

    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/3ZLhfmZWLXk" frameborder="0" allowfullscreen></iframe>
    </div>

    <a href="#" class="btn-token"></a>

    <div class="grid">
        <a href="#" class="btn">MÚSICA</a>
        <a href="#" class="btn">DEPORTES</a>
        <a href="#" class="btn">NOTICIAS</a>
        <a href="#" class="btn">CIENCIAS</a>
        <a href="#" class="btn">CINE</a>
        <a href="#" class="btn">GAMING</a>
    </div>

    <div class="grid" style="grid-template-columns: 1fr 1fr; margin-top: 15px;">
        <a href="#" class="btn" style="border-color: #00ffcc;">ZAARD ARCADE</a>
        <a href="#" class="btn" style="border-color: #00ffcc;">ZAARD WEB</a>
    </div>

</body>
</html>
